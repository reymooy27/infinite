services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: infinite
      POSTGRES_PASSWORD: infinite
      POSTGRES_DB: infinite
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infinite"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://infinite:infinite@db:5432/infinite
      DIRECT_URL: postgresql://infinite:infinite@db:5432/infinite
      ENCRYPTION_SECRET: e45ecd03425f98373b8144e9560e4e7b1f3a3caf635dd53eb74433594091db85
      NEXT_PUBLIC_WS_URL: ""
    depends_on:
      db:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://infinite:infinite@db:5432/infinite
      DIRECT_URL: postgresql://infinite:infinite@db:5432/infinite
      ENCRYPTION_SECRET: e45ecd03425f98373b8144e9560e4e7b1f3a3caf635dd53eb74433594091db85
      PORT: "3001"
      ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
