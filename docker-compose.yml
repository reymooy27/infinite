services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: infinite
      POSTGRES_PASSWORD: infinite
      POSTGRES_DB: infinite
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infinite"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Host networking lets the frontend reach host-bound services (9router on
    # :20128, the backend relay on :7891, postgres on :5432) directly via
    # 127.0.0.1. The docker bridge cannot reach the host because the host
    # firewall drops bridge->host traffic.
    network_mode: "host"
    environment:
      DATABASE_URL: postgresql://infinite:infinite@127.0.0.1:5432/infinite
      DIRECT_URL: postgresql://infinite:infinite@127.0.0.1:5432/infinite
      ENCRYPTION_SECRET: e45ecd03425f98373b8144e9560e4e7b1f3a3caf635dd53eb74433594091db85
      NEXT_PUBLIC_WS_URL: ""
      RELAY_URL: http://127.0.0.1:7891
      ROUTER_USAGE_BASE_URL: http://127.0.0.1:20128
    depends_on:
      db:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    ports:
      - "7891:7891"
    environment:
      DATABASE_URL: postgresql://infinite:infinite@db:5432/infinite
      DIRECT_URL: postgresql://infinite:infinite@db:5432/infinite
      ENCRYPTION_SECRET: e45ecd03425f98373b8144e9560e4e7b1f3a3caf635dd53eb74433594091db85
      PORT: "7891"
      ALLOWED_ORIGINS: http://localhost:7890
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
