[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  internal_port = 3001
  protocol = "tcp"

  # Handle Standard HTTP (Port 80) -> Redirects to 443
  [[services.ports]]
    handlers = ["http"]
    port = 80

  # Handle Secure WebSockets/HTTPS (Port 443) -> Maps to 3001
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.tcp_checks]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
    restart_limit = 0
