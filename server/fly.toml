app = "infinite-server"
primary_region = "sin"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "3001"
WS_PORT = "3001"

[http_service]
internal_port = 3001
force_https = false
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1

[[services]]
internal_port = 3001
protocol = "tcp"

  [[services.ports]]
    port = 3001

  [services.tcp_checks]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
    restart_limit = 0